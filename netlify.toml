[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 301 redirects: legacy recruiting URLs land on the new pages that replaced them.
# The old standalone pages (leadership, nexus, platform, summit, legacy index)
# have been migrated onto the shared Astro layout; their .html URLs 301 to the
# new routes so existing links and search rankings survive.

[[redirects]]
  from = "/for-universities.html"
  to = "/for-universities/"
  status = 301
  force = true

[[redirects]]
  from = "/leadership.html"
  to = "/leadership/"
  status = 301
  force = true

[[redirects]]
  from = "/for-organizations.html"
  to = "/for-organizations/"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/contact/"
  status = 301
  force = true

[[redirects]]
  from = "/platform.html"
  to = "/platform/"
  status = 301
  force = true

[[redirects]]
  from = "/nexus.html"
  to = "/nexus/"
  status = 301
  force = true

[[redirects]]
  from = "/summit.html"
  to = "/summit/"
  status = 301
  force = true

[[redirects]]
  from = "/legacy-index.html"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
