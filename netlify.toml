[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 301 redirects: legacy recruiting URLs land on the new pages that replaced them.
# The old standalone pages (leadership, nexus, platform, summit, legacy index)
# have been migrated onto the shared Astro layout; their .html URLs 301 to the
# new routes so existing links and search rankings survive.

[[redirects]]
  from = "/for-universities.html"
  to = "/for-universities/"
  status = 301
  force = true

[[redirects]]
  from = "/leadership.html"
  to = "/leadership/"
  status = 301
  force = true

[[redirects]]
  from = "/for-organizations.html"
  to = "/for-organizations/"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/contact/"
  status = 301
  force = true

[[redirects]]
  from = "/platform.html"
  to = "/platform/"
  status = 301
  force = true

[[redirects]]
  from = "/nexus.html"
  to = "/nexus/"
  status = 301
  force = true

[[redirects]]
  from = "/summit.html"
  to = "/summit/"
  status = 301
  force = true

[[redirects]]
  from = "/legacy-index.html"
  to = "/"
  status = 301
  force = true

# Advisory board consolidated into the Leadership page; its content now lives
# there as the named-roster centerpiece. Old URLs 301 to /leadership/.
[[redirects]]
  from = "/advisory-board"
  to = "/leadership/"
  status = 301
  force = true

[[redirects]]
  from = "/advisory-board/"
  to = "/leadership/"
  status = 301
  force = true

# Advisor directory: served from a separate Netlify site (zai-advisor-directory)
# but surfaced here under zaiinstitute.ai/advisors/<school>/. status 200 = proxy
# (the URL stays on zaiinstitute.ai). :splat strips the /advisors prefix to match
# that site's root-level output, so /advisors/ollu/ -> .../ollu/ and the
# /advisors/_astro/* assets resolve through the same rule.
[[redirects]]
  from = "/advisors/*"
  to = "https://zai-advisory-directory.netlify.app/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
